<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="자연어를 입력하면 MariaDB SQL 쿼리로 변환해주는 AI 도구">
  <title>NL2SQL — 자연어 → SQL 변환기</title>
  <style>
/* ============================================================
   NL2SQL — Premium Dark Theme with Glassmorphism
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* ── Design Tokens ── */
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: rgba(17, 24, 39, 0.7);
  --bg-glass: rgba(30, 41, 59, 0.5);
  --bg-input: rgba(15, 23, 42, 0.8);
  --border-glass: rgba(99, 102, 241, 0.15);
  --border-focus: rgba(99, 102, 241, 0.5);

  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --text-accent: #a5b4fc;

  --accent-primary: #6366f1;
  --accent-secondary: #818cf8;
  --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
  --accent-glow: rgba(99, 102, 241, 0.3);

  --success: #34d399;
  --warning: #fbbf24;
  --error: #f87171;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;

  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.15);

  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Reset & Base ── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── Background Effects ── */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
              radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: bgFloat 30s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -1%) rotate(1deg); }
  66% { transform: translate(-1%, 2%) rotate(-1deg); }
}

/* ── Layout ── */
.app-container {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 24px 60px;
  min-height: 100vh;
}

/* ── Header ── */
.app-header {
  text-align: center;
  padding: 40px 0 32px;
  position: relative;
}

.app-header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.app-header .subtitle {
  font-size: 0.95rem;
  color: var(--text-secondary);
  font-weight: 400;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.2);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.75rem;
  color: var(--text-accent);
  margin-top: 12px;
}

.header-badge .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── API Settings Bar ── */
.api-settings {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-md);
  padding: 12px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  backdrop-filter: blur(12px);
}

.api-settings label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

.api-settings input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  outline: none;
  transition: border-color var(--transition);
}

.api-settings input:focus {
  border-color: var(--border-focus);
}

.api-settings select {
  background: var(--bg-input);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
  min-width: 180px;
}

.api-settings select:focus {
  border-color: var(--border-focus);
}

.api-settings select option {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.api-settings .save-btn {
  background: var(--accent-gradient);
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.api-settings .save-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--accent-glow);
}

.api-status {
  font-size: 0.75rem;
  padding: 4px 10px;
  border-radius: 12px;
  white-space: nowrap;
}

.api-status.connected {
  background: rgba(52, 211, 153, 0.1);
  color: var(--success);
  border: 1px solid rgba(52, 211, 153, 0.2);
}

.api-status.disconnected {
  background: rgba(248, 113, 113, 0.1);
  color: var(--error);
  border: 1px solid rgba(248, 113, 113, 0.2);
}

/* ── Main Input Section ── */
.input-section {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 24px;
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow-glow);
  transition: all var(--transition);
}

.input-section:focus-within {
  border-color: var(--border-focus);
  box-shadow: var(--shadow-glow), 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.input-wrapper {
  position: relative;
}

.input-wrapper textarea {
  width: 100%;
  min-height: 100px;
  background: var(--bg-input);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: all var(--transition);
}

.input-wrapper textarea:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
}

.input-wrapper textarea::placeholder {
  color: var(--text-muted);
}

.input-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
}

.char-count {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.btn-generate {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-gradient);
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: var(--radius-md);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.btn-generate:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--accent-glow);
}

.btn-generate:active:not(:disabled) {
  transform: translateY(0);
}

.btn-generate:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-generate .spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.btn-generate.loading .spinner {
  display: block;
}

.btn-generate.loading .btn-text {
  opacity: 0.6;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Example Cards ── */
.examples-section {
  margin-bottom: 24px;
}

.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.section-title .icon {
  font-size: 1rem;
}

.examples-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

.example-card {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.example-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent-gradient);
  opacity: 0;
  transition: opacity var(--transition);
}

.example-card:hover {
  border-color: rgba(99, 102, 241, 0.3);
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}

.example-card:hover::before {
  opacity: 1;
}

.example-card .question {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.example-card .desc {
  font-size: 0.72rem;
  color: var(--text-muted);
  line-height: 1.4;
}

/* ── Result Section ── */
.result-section {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 24px;
  backdrop-filter: blur(16px);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.result-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: rgba(15, 23, 42, 0.6);
  border-bottom: 1px solid var(--border-glass);
}

.result-header .label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-accent);
}

.result-header .label .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}

.result-actions {
  display: flex;
  gap: 6px;
}

.result-actions button {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.2);
  color: var(--text-accent);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}

.result-actions button:hover {
  background: rgba(99, 102, 241, 0.2);
  border-color: rgba(99, 102, 241, 0.4);
}

.result-actions button.copied {
  background: rgba(52, 211, 153, 0.15);
  border-color: rgba(52, 211, 153, 0.3);
  color: var(--success);
}

.sql-output {
  padding: 20px 24px;
  overflow-x: auto;
}

.sql-output pre {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── SQL Syntax Highlighting ── */
.sql-keyword { color: #c084fc; font-weight: 600; }
.sql-function { color: #60a5fa; }
.sql-string { color: #34d399; }
.sql-number { color: #fbbf24; }
.sql-comment { color: #64748b; font-style: italic; }
.sql-operator { color: #f472b6; }
.sql-table { color: #fb923c; }
.sql-alias { color: #a5b4fc; }

/* ── Tabs (History / Schema) ── */
.tabs-container {
  margin-bottom: 24px;
}

.tabs-header {
  display: flex;
  gap: 2px;
  background: rgba(15, 23, 42, 0.4);
  border-radius: var(--radius-md) var(--radius-md) 0 0;
  padding: 4px;
  border: 1px solid var(--border-glass);
  border-bottom: none;
}

.tab-btn {
  flex: 1;
  padding: 10px 20px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
}

.tab-btn.active {
  background: var(--bg-glass);
  color: var(--text-accent);
}

.tab-btn:hover:not(.active) {
  color: var(--text-secondary);
}

.tab-content {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  border-top: none;
  border-radius: 0 0 var(--radius-md) var(--radius-md);
  backdrop-filter: blur(12px);
  max-height: 450px;
  overflow-y: auto;
}

.tab-panel {
  display: none;
  padding: 20px;
}

.tab-panel.active {
  display: block;
}

/* ── History Panel ── */
.history-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-item {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(99, 102, 241, 0.08);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  cursor: pointer;
  transition: all var(--transition);
}

.history-item:hover {
  border-color: rgba(99, 102, 241, 0.2);
  background: rgba(15, 23, 42, 0.6);
}

.history-item .h-question {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.history-item .h-time {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.history-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 0.85rem;
}

.history-item .h-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.history-item .h-actions button {
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.15);
  color: var(--text-accent);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all var(--transition);
}

.history-item .h-actions button:hover {
  background: rgba(99, 102, 241, 0.2);
}

.history-item .h-actions button.delete-btn {
  color: var(--error);
  border-color: rgba(248, 113, 113, 0.15);
  background: rgba(248, 113, 113, 0.05);
}

.history-item .h-actions button.delete-btn:hover {
  background: rgba(248, 113, 113, 0.15);
}

/* ── Schema Viewer ── */
.schema-table {
  margin-bottom: 20px;
}

.schema-table-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(99, 102, 241, 0.06);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 4px;
}

.schema-table-header:hover {
  background: rgba(99, 102, 241, 0.12);
}

.schema-table-header .table-name {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 600;
  color: #fb923c;
}

.schema-table-header .table-desc {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.schema-table-header .toggle-icon {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 0.75rem;
  transition: transform var(--transition);
}

.schema-table-header.open .toggle-icon {
  transform: rotate(180deg);
}

.schema-columns {
  display: none;
  padding: 0 8px;
}

.schema-columns.open {
  display: block;
}

.schema-col-row {
  display: grid;
  grid-template-columns: 160px 100px 1fr;
  gap: 8px;
  padding: 6px 14px;
  font-size: 0.75rem;
  border-bottom: 1px solid rgba(99, 102, 241, 0.05);
}

.schema-col-row:last-child {
  border-bottom: none;
}

.schema-col-name {
  font-family: var(--font-mono);
  color: var(--text-accent);
  font-weight: 500;
}

.schema-col-type {
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.7rem;
}

.schema-col-desc {
  color: var(--text-secondary);
}

/* ── Error / Toast ── */
.error-message {
  background: rgba(248, 113, 113, 0.1);
  border: 1px solid rgba(248, 113, 113, 0.2);
  border-radius: var(--radius-md);
  padding: 14px 20px;
  margin-bottom: 20px;
  color: var(--error);
  font-size: 0.85rem;
  display: none;
}

.error-message.visible {
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  font-weight: 500;
  z-index: 1000;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.toast.visible {
  transform: translateY(0);
  opacity: 1;
}

.toast.success {
  background: rgba(52, 211, 153, 0.15);
  border: 1px solid rgba(52, 211, 153, 0.3);
  color: var(--success);
}

.toast.info {
  background: rgba(99, 102, 241, 0.15);
  border: 1px solid rgba(99, 102, 241, 0.3);
  color: var(--text-accent);
}

/* ── Scrollbar ── */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(99, 102, 241, 0.2);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(99, 102, 241, 0.4);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .app-container {
    padding: 16px 12px 40px;
  }

  .app-header h1 {
    font-size: 1.6rem;
  }

  .api-settings {
    flex-wrap: wrap;
  }

  .api-settings input {
    flex-basis: 100%;
  }

  .examples-grid {
    grid-template-columns: 1fr;
  }

  .input-actions {
    flex-direction: column;
    gap: 12px;
    align-items: flex-end;
  }

  .schema-col-row {
    grid-template-columns: 1fr;
    gap: 2px;
  }
}
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>🔮 NL2SQL</h1>
      <p class="subtitle">자연어를 MariaDB SQL 쿼리로 변환합니다</p>
      <div class="header-badge">
        <span class="dot"></span>
        Powered by Google Gemini
      </div>
    </header>

    <div class="api-settings">
      <label for="modelSelect">🤖 모델</label>
      <select id="modelSelect">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash (추천)</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      </select>
      <span class="api-status connected" id="apiStatus">API 연결됨 ✓</span>
    </div>

    <div class="error-message" id="errorMsg">
      <span>⚠️</span>
      <span id="errorText"></span>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <textarea id="nlInput" placeholder="원하는 데이터를 자연어로 설명해 주세요...&#10;&#10;예: 유진투자증권의 현재 활성 가입자 중 투자금액이 1000만원 이상인 고객의 계좌번호, 전략명, 투자금액, 수익률을 보여줘&#10;&#10;⌘+Enter 또는 Ctrl+Enter로 빠르게 생성" rows="4"></textarea>
      </div>
      <div class="input-actions">
        <span class="char-count" id="charCount">0자</span>
        <button class="btn-generate" id="generateBtn">
          <div class="spinner"></div>
          <span class="btn-text">✨ SQL 생성</span>
        </button>
      </div>

const EXAMPLE_QUERIES = [
  {
    question: '유진투자증권 전체 가입현황을 보여줘',

    sql: `SELECT CASE
           WHEN B.STATUS = 'T' THEN '해지'
           WHEN B.END_REGI_DATE != '' THEN '해지진행중'
           ELSE '가입'
    END AS '상품가입여부',
    CASE
           WHEN B.SCCO_CD = '280' THEN '유진투자증권'
           WHEN B.SCCO_CD = '270' THEN '하나증권'
           ELSE 'NO DATA'
    END AS '증권사',
    LEFT(D.JOIN_DATE, 10) AS '회원가입일자',
    CASE WHEN E.CHANNEL = '3' THEN 'MTS' ELSE 'WEB' END AS '가입경로',
    E.UID AS '사용자ID',
    B.ACCOUNT AS '계좌번호',
    CONCAT(SUBSTR(B.FIRST_DATE, 1, 4), '-', SUBSTR(B.FIRST_DATE, 5, 2), '-', SUBSTR(B.FIRST_DATE, 7, 2)) AS '상품가입일자',
    B.PORTFOLIO AS '전략코드',
    C.NAME AS '전략명',
    NVL(B.FIRST_AMOUNT + B.ADD_AMOUNT, 0) AS '총 투자금액',
    ROUND(NVL(A.PORT_RATE, 0), 3) AS '수익률'
FROM TC5009MT B
    LEFT JOIN TC5404HS A ON A.SCCO_CD = B.SCCO_CD AND A.ACCOUNT = B.ACCOUNT AND A.PTFL_ID = B.PTFL_ID AND A.PORTFOLIO = B.PORTFOLIO AND A.FIRST_DATE = B.FIRST_DATE
        AND A.\`DATE\` = (SELECT MAX(\`DATE\`) FROM TC5404HS WHERE A.SCCO_CD = SCCO_CD AND A.ACCOUNT = ACCOUNT AND A.PTFL_ID = PTFL_ID AND A.PORTFOLIO = PORTFOLIO)
        AND A.\`DATE\` <= DATE_FORMAT(NOW(), '%Y%m%d')
    INNER JOIN TC3000MT C ON B.PORTFOLIO = CONCAT(C.COMD_TYPE, C.CODE)
    INNER JOIN api_mpot.TC_USER_ACCOUNT E ON B.ACCOUNT = E.ACCOUNT AND B.SCCO_CD = E.ACCOUNT_CORP
    INNER JOIN api_mpot.TC_USER D ON E.UID = D.UID
WHERE B.SCCO_CD = 280
ORDER BY 1, 8 DESC;`
  },
  {
    question: '상품별 가입수와 AUM을 보여줘',
    description: '전략코드별 가입 수, 투자금액, AUM 집계',
    sql: `SET @SCCO_CD = 280;
SELECT
    MAIN_A.\`전략코드\`,
    (SELECT \`name\` FROM TC3000MT WHERE CONCAT(COMD_TYPE, LEFT(CODE, 3)) = MAIN_A.\`전략코드\` LIMIT 1) AS \`전략명\`,
    COUNT(1) AS \`가입수\`,
    SUM(MAIN_A.\`투자금액\`) AS \`투자금액\`,
    SUM(MAIN_A.\`AUM\`) AS \`AUM\`

    SELECT LEFT(A.PORTFOLIO, 5) AS \`전략코드\`,
           A.PTFL_ID AS \`ptfl_id\`,
           (A.FIRST_AMOUNT + A.ADD_AMOUNT) AS \`투자금액\`,

    WHERE STATUS = 'A' AND A.SCCO_CD = @SCCO_CD

    E.FEE_COLLECTION_YN AS '수수료 징수 여부'
FROM api_mpot.TC_USER_ACCOUNT A
    INNER JOIN TC5509MT B ON A.ACCOUNT = B.ACCOUNT
    INNER JOIN TC3000MT C ON B.PORTFOLIO = C.PORTFOLIO
    LEFT JOIN TC5406MT E ON A.ACCOUNT = E.ACCOUNT AND B.FIRST_DATE = E.FIRST_DATE AND B.PORTFOLIO = E.PORTFOLIO AND B.PTFL_ID = E.PTFL_ID
    LEFT JOIN TP5760MT F ON A.ACCOUNT_CORP = F.FNNC_CORP_CD AND A.ACCOUNT = F.ACNT_NO
    LEFT JOIN api_mpot.TC_USER G ON A.UID = G.UID
WHERE B.END_DATE LIKE @targetMonth AND B.SCCO_CD = @financialCorpCode;`

    sql: `SELECT

            ) D ON A.ACCOUNT = D.ACCOUNT AND A.SCCO_CD = D.SCCO_CD AND LEFT(A.PORTFOLIO, 5) = LEFT(D.PORTFOLIO, 5)
        WHERE A.STATUS = 'A' AND A.SCCO_CD = '280'
    ), 0) AS 'AUM';`
  },

    question: '활성 계좌 수를 알려줘',

// ============================================================
function buildSystemPrompt() {
  let schemaText = '## 데이터베이스 스키마 (MariaDB)\n\n';

  for (const table of DB_SCHEMA.tables) {
    schemaText += `### ${table.name}\n`;
    schemaText += `${table.description}\n\n`;
    schemaText += '| 컬럼명 | 타입 | 설명 |\n|--------|------|------|\n';
    for (const col of table.columns) {
      schemaText += `| ${col.name} | ${col.type} | ${col.desc} |\n`;
    }
    schemaText += '\n';
  }

  schemaText += '## 테이블 간 관계 (JOIN 조건)\n\n';
  for (const rel of DB_SCHEMA.relationships) {
    schemaText += `- ${rel}\n`;
  }

  let examplesText = '\n## 예시 (자연어 → SQL)\n\n';
  for (const ex of EXAMPLE_QUERIES) {
    examplesText += `### 질문: "${ex.question}"\n`;
    examplesText += `설명: ${ex.description}\n`;
    examplesText += '```sql\n' + ex.sql + '\n```\n\n';
  }

  return `당신은 MariaDB SQL 전문가입니다. 아래 데이터베이스 스키마를 기반으로 사용자의 한국어 자연어 질문을 MariaDB SQL 쿼리로 변환해주세요.

## 규칙
1. MariaDB 문법만 사용하세요 (NVL, IFNULL, DATE_FORMAT 등).
2. 예약어인 컬럼명(DATE 등)은 반드시 백틱(\`)으로 감싸세요.
3. 증권사 코드: 280=유진투자증권, 270=하나증권.
4. 날짜 형식은 YYYYMMDD (VARCHAR)입니다. 날짜 비교 시 문자열로 처리하세요.
5. 활성 가입은 TC5009MT (STATUS='A'), 해지 완료는 TC5509MT (STATUS='T')에 있습니다.
6. AUM = INV_AMOUNT + TOT_PNL (TC5404HS 최신 레코드 기준).
7. 총 투자금액 = FIRST_AMOUNT + ADD_AMOUNT.
8. SQL 쿼리만 출력하세요. 설명이 필요하면 SQL 주석(-- 또는 /* */)으로 작성하세요.
9. 변수가 필요한 경우 SET @변수명 = 값; 으로 설정하세요.
10. 한글 별칭을 사용하세요 (예: AS '가입수').

${schemaText}
${examplesText}`;
}

// ============================================================
// Get schema info for the schema viewer
// ============================================================
function getSchemaForViewer() {
  return DB_SCHEMA.tables;
}

function getRelationships() {
  return DB_SCHEMA.relationships;
}

function getExampleQuestions() {
  return EXAMPLE_QUERIES.map(q => ({
    question: q.question,
    description: q.description
  }));
}

// Export for use in app.js
window.NL2SQL = {
  buildSystemPrompt,
  getSchemaForViewer,
  getRelationships,
  getExampleQuestions,
  EXAMPLE_QUERIES
};

// ============================================================
// NL2SQL — App Logic (Bundled Version with embedded API Key)
// ============================================================

(function () {
  'use strict';

  // ── Hardcoded API Key ──
  const EMBEDDED_API_KEY = 'AIzaSyCmJfO3uo1VnpfuNCXqsnz_7kfWCG4t4u8';

  // ── DOM Elements ──
  const modelSelect = document.getElementById('modelSelect');
  const nlInput = document.getElementById('nlInput');
  const charCount = document.getElementById('charCount');
  const generateBtn = document.getElementById('generateBtn');
  const resultSection = document.getElementById('resultSection');
  const sqlOutput = document.getElementById('sqlOutput');
  const copyBtn = document.getElementById('copyBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const errorMsg = document.getElementById('errorMsg');
  const errorText = document.getElementById('errorText');
  const examplesGrid = document.getElementById('examplesGrid');
  const historyList = document.getElementById('historyList');
  const schemaViewer = document.getElementById('schemaViewer');
  const toast = document.getElementById('toast');

  // ── Fallback model order ──
  const FALLBACK_MODELS = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.0-flash-lite', 'gemini-2.5-pro'];

  // ── State ──
  let currentSQL = '';
  let history = JSON.parse(localStorage.getItem('nl2sql_history') || '[]');

  // ── Initialize ──
  function init() {
    const savedModel = localStorage.getItem('nl2sql_model');
    if (savedModel) modelSelect.value = savedModel;
    renderExamples();
    renderHistory();
    renderSchema();
    bindEvents();
  }

  // ── Example Cards ──
  function renderExamples() {
    const examples = window.NL2SQL.getExampleQuestions();
    examplesGrid.innerHTML = examples.map((ex, i) => `
      <div class="example-card" data-index="${i}">
        <div class="question">${ex.question}</div>
        <div class="desc">${ex.description}</div>
      </div>
    `).join('');
  }

  // ── Schema Viewer ──
  function renderSchema() {
    const tables = window.NL2SQL.getSchemaForViewer();
    schemaViewer.innerHTML = tables.map((t, i) => `
      <div class="schema-table">
        <div class="schema-table-header" data-schema="${i}">
          <span class="table-name">${t.name}</span>
          <span class="table-desc">${t.description}</span>
          <span class="toggle-icon">▼</span>
        </div>
        <div class="schema-columns" id="schema-cols-${i}">
          ${t.columns.map(c => `
            <div class="schema-col-row">
              <span class="schema-col-name">${c.name}</span>
              <span class="schema-col-type">${c.type}</span>
              <span class="schema-col-desc">${c.desc}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  // ── History ──
  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="history-empty">아직 생성된 쿼리가 없습니다</div>';
      return;
    }
    historyList.innerHTML = history.map((item, i) => `
      <div class="history-item" data-index="${i}">
        <div class="h-question">${item.question}</div>
        <div class="h-time">${item.time}</div>
        <div class="h-actions">
          <button class="load-btn" data-index="${i}">불러오기</button>
          <button class="delete-btn" data-index="${i}">삭제</button>
        </div>
      </div>
    `).join('');
  }

  function addToHistory(question, sql) {
    const entry = { question, sql, time: new Date().toLocaleString('ko-KR') };
    history.unshift(entry);
    if (history.length > 50) history.pop();
    localStorage.setItem('nl2sql_history', JSON.stringify(history));
    renderHistory();
  }

  // ── SQL Generation via Gemini API ──
  async function callGeminiAPI(apiKey, model, systemPrompt, question) {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents: [{ parts: [{ text: question }] }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
        })
      }
    );
    return response;
  }

  async function generateSQL() {
    const question = nlInput.value.trim();
    if (!question) { showError('질문을 입력해 주세요.'); return; }

    hideError();
    setLoading(true);

    const systemPrompt = window.NL2SQL.buildSystemPrompt();
    const selectedModel = modelSelect.value;
    const modelsToTry = [selectedModel, ...FALLBACK_MODELS.filter(m => m !== selectedModel)];

    for (const model of modelsToTry) {
      try {
        if (model !== selectedModel) {
          showToast(`${selectedModel} 할당량 초과 → ${model} 시도 중...`, 'info');
        }

        const response = await callGeminiAPI(EMBEDDED_API_KEY, model, systemPrompt, question);

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const errMsg = errData?.error?.message || '';
          if (response.status === 429 || errMsg.toLowerCase().includes('quota')) {
            console.warn(`${model}: 할당량 초과, 다음 모델 시도...`);
            continue;
          }
          throw new Error(errMsg || `API 요청 실패 (${response.status})`);
        }

        const data = await response.json();
        let sqlText = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
        sqlText = sqlText.replace(/^```sql\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();

        if (!sqlText) { throw new Error('SQL 쿼리를 생성할 수 없습니다. 질문을 더 구체적으로 작성해 주세요.'); }

        currentSQL = sqlText;
        showResult(sqlText);
        addToHistory(question, sqlText);
        const usedModel = model === selectedModel ? model : `${model} (대체)`;
        showToast(`SQL 쿼리 생성 완료! (${usedModel})`, 'success');
        setLoading(false);
        return;
      } catch (err) {
        if (err.message.toLowerCase().includes('quota') && model !== modelsToTry[modelsToTry.length - 1]) continue;
        showError(err.message);
        setLoading(false);
        return;
      }
    }
    showError('모든 모델의 할당량이 초과되었습니다. 잠시 후 다시 시도해 주세요.');
    setLoading(false);
  }

  // ── SQL Syntax Highlighting ──
  function highlightSQL(sql) {
    let html = sql.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    html = html.replace(/(--[^\n]*)/g, '<span class="sql-comment">$1</span>');
    html = html.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="sql-comment">$1</span>');
    html = html.replace(/('(?:[^'\\]|\\.)*')/g, '<span class="sql-string">$1</span>');
    html = html.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="sql-number">$1</span>');
    const keywords = [
      'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'NOT', 'IN', 'ON', 'AS',
      'INNER\\s+JOIN', 'LEFT\\s+JOIN', 'RIGHT\\s+JOIN', 'CROSS\\s+JOIN', 'JOIN',
      'GROUP\\s+BY', 'ORDER\\s+BY', 'HAVING', 'LIMIT', 'OFFSET',
      'UNION\\s+ALL', 'UNION', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END',
      'INSERT\\s+INTO', 'UPDATE', 'DELETE', 'CREATE', 'ALTER', 'DROP',
      'SET', 'VALUES', 'INTO', 'IS\\s+NULL', 'IS\\s+NOT\\s+NULL',
      'LIKE', 'BETWEEN', 'EXISTS', 'DISTINCT', 'DESC', 'ASC',
      'NULL', 'TRUE', 'FALSE', 'IF', 'IFNULL', 'CONCAT', 'SUBSTR',
      'LEFT', 'RIGHT', 'DATE_FORMAT', 'STR_TO_DATE', 'DATE_ADD', 'DATE_SUB',
      'DATE', 'NOW', 'CURDATE', 'INTERVAL', 'YEAR', 'MONTH', 'DAY',
      'NVL', 'ROUND', 'TRUNCATE', 'GREATEST', 'SUM', 'COUNT', 'MAX', 'MIN', 'AVG'
    ];
    const kwPattern = new RegExp(`\\b(${keywords.join('|')})\\b`, 'gi');
    html = html.replace(kwPattern, (match) => `<span class="sql-keyword">${match}</span>`);
    return html;
  }

  function showResult(sql) {
    sqlOutput.innerHTML = highlightSQL(sql);
    resultSection.classList.add('visible');
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function setLoading(loading) {
    generateBtn.disabled = loading;
    generateBtn.classList.toggle('loading', loading);
  }

  function showError(msg) { errorText.textContent = msg; errorMsg.classList.add('visible'); }
  function hideError() { errorMsg.classList.remove('visible'); }

  function showToast(message, type = 'info') {
    toast.textContent = message;
    toast.className = `toast ${type}`;
    requestAnimationFrame(() => toast.classList.add('visible'));
    setTimeout(() => toast.classList.remove('visible'), 3000);
  }

  function copySQL() {
    if (!currentSQL) return;
    navigator.clipboard.writeText(currentSQL).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✅ 복사됨!';
      setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.innerHTML = '📋 복사'; }, 2000);
    });
  }

  function downloadSQL() {
    if (!currentSQL) return;
    const blob = new Blob([currentSQL], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `query_${Date.now()}.sql`; a.click();
    URL.revokeObjectURL(url);
    showToast('SQL 파일이 다운로드 되었습니다.', 'success');
  }

  function bindEvents() {
    modelSelect.addEventListener('change', () => localStorage.setItem('nl2sql_model', modelSelect.value));
    nlInput.addEventListener('input', () => charCount.textContent = `${nlInput.value.length}자`);
    nlInput.addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generateSQL(); });
    generateBtn.addEventListener('click', generateSQL);
    copyBtn.addEventListener('click', copySQL);
    downloadBtn.addEventListener('click', downloadSQL);

    examplesGrid.addEventListener('click', (e) => {
      const card = e.target.closest('.example-card');
      if (card) {
        const idx = parseInt(card.dataset.index);
        const examples = window.NL2SQL.getExampleQuestions();
        nlInput.value = examples[idx].question;
        charCount.textContent = `${nlInput.value.length}자`;
        nlInput.focus();
        generateSQL();
      }
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
      });
    });

    schemaViewer.addEventListener('click', (e) => {
      const header = e.target.closest('.schema-table-header');
      if (header) {
        const idx = header.dataset.schema;
        document.getElementById(`schema-cols-${idx}`).classList.toggle('open');
        header.classList.toggle('open');
      }
    });

    historyList.addEventListener('click', (e) => {
      const loadBtn = e.target.closest('.load-btn');
      const deleteBtn = e.target.closest('.delete-btn');
      if (loadBtn) {
        const item = history[parseInt(loadBtn.dataset.index)];
        if (item) { nlInput.value = item.question; charCount.textContent = `${nlInput.value.length}자`; currentSQL = item.sql; showResult(item.sql); showToast('히스토리에서 불러왔습니다.', 'info'); }
      }
      if (deleteBtn) {
        history.splice(parseInt(deleteBtn.dataset.index), 1);
        localStorage.setItem('nl2sql_history', JSON.stringify(history));
        renderHistory();
        showToast('히스토리가 삭제되었습니다.', 'info');
      }
    });
  }

  init();
})();
  </script>
</body>
</html>
